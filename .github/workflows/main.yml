name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: api-person-data/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: api-person-data

      - name: Execute Jest Suite
        run: npm run test
        working-directory: api-person-data
